version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/NDLytics/app

permissions:
  - object: /home/ec2-user/NDLytics/app
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - directory
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 60
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
